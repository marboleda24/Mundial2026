{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow-lg border-0">
            <div class="text-center mb-4">
                <i class="fas fa-rocket fa-4x text-success mb-3"></i>
                <h3 class="font-weight-bold text-white">Únete a la Fiebre</h3>
                <p class="text-muted small">Crea tu cuenta, arma tu polla y reta a tus amigos.</p>
            </div>
            
            <form action="{{ url_for('autenticacion.registro') }}" method="POST">
                <div class="form-group mb-4">
                    <label for="correo" class="text-muted font-weight-bold"><i class="fas fa-envelope text-info mr-2"></i> Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg" id="correo" name="correo" required placeholder="tu@email.com">
                    <small class="form-text text-muted">Nunca compartiremos tu correo. Lo usamos para enviarte notificaciones de la polla.</small>
                </div>
                
                <div class="form-group mb-4">
                    <label for="nombre_usuario" class="text-muted font-weight-bold"><i class="fas fa-user-tag text-info mr-2"></i> Nombre de Batalla (Usuario)</label>
                    <input type="text" class="form-control form-control-lg" id="nombre_usuario" name="nombre_usuario" required minlength="3" maxlength="50" placeholder="Ej: ReyDelGol">
                </div>
                
                <div class="form-group mb-4">
                    <label for="password" class="text-muted font-weight-bold"><i class="fas fa-lock text-info mr-2"></i> Contraseña Segura</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required minlength="8" placeholder="Mínimo 8 caracteres">
                </div>
                
                <button type="submit" class="btn btn-success btn-block btn-lg mt-4 shadow font-weight-bold">
                    Crear mi Cuenta Ahora <i class="fas fa-check-circle ml-2"></i>
                </button>
            </form>
            
            <div class="text-center mt-4 border-top pt-3 border-secondary">
                <p class="text-muted">¿Ya tienes una cuenta? <a href="{{ url_for('autenticacion.login') }}" class="text-success font-weight-bold">Inicia Sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
