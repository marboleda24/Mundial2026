{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow-lg border-0">
            <div class="text-center mb-4">
                <i class="fas fa-user-astronaut fa-4x text-warning mb-3"></i>
                <h3 class="font-weight-bold text-white">Iniciar Sesión</h3>
                <p class="text-muted small">Accede a tu cuenta para continuar los pronósticos</p>
            </div>
            <form action="{{ url_for('autenticacion.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" method="POST">
                <div class="form-group mb-4">
                    <label for="correo" class="text-muted font-weight-bold"><i class="fas fa-envelope text-info mr-2"></i> Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg" id="correo" name="correo" required placeholder="tu@email.com">
                </div>
                <div class="form-group mb-4">
                    <label for="password" class="text-muted font-weight-bold"><i class="fas fa-lock text-info mr-2"></i> Contraseña</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-warning btn-block btn-lg mt-2 shadow font-weight-bold">
                    Ingresar <i class="fas fa-sign-in-alt ml-2"></i>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted">¿Eres nuevo aquí? <a href="{{ url_for('autenticacion.registro') }}" class="text-warning font-weight-bold">Créate una cuenta</a></p>
                <div class="mt-3">
                    <button class="btn btn-outline-light btn-sm btn-block" disabled><i class="fab fa-google text-danger"></i> Entrar con Google (Pronto)</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
