{% extends "base.html" %}

{% block content %}
<div style="max-width: 420px; margin: 4rem auto;">
    <div class="card fade-in" style="border-top: 4px solid var(--secondary-color); text-align: center;">

        <div style="margin-bottom: 2rem;">
            <i class="fas fa-fingerprint" style="font-size: 3rem; color: var(--primary-color);"></i>
        </div>

        <h2 style="margin-bottom: 0.5rem; color: white;">Bienvenido de nuevo</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Ingresa para gestionar tus predicciones.</p>

        <form action="{{ url_for('login') }}" method="POST" style="text-align: left;">
            <div class="form-group">
                <label for="username"><i class="fas fa-user" style="width: 20px;"></i> Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ej. CR7" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock" style="width: 20px;"></i> Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-block" style="margin-top: 1rem;">
                Ingresar <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="font-size: 0.9rem; color: var(--text-muted);">¿Aún no tienes cuenta?</p>
            <a href="{{ url_for('registro') }}"
                style="color: var(--secondary-color); font-weight: 600; text-decoration: underline;">
                Crea tu cuenta aquí
            </a>
        </div>
    </div>
</div>
{% endblock %}
